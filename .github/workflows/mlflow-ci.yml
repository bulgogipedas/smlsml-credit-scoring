name: MLflow CI

on:
  workflow_dispatch:
  push:
    paths:
      - "Workflow-CI/**"
      - "Eksperimen_SML_Rafli-Ardiansyah/preprocessing/automate_Rafli_Ardiansyah.py"
      - ".github/workflows/mlflow-ci.yml"

jobs:
  train-build-push:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/smlsml-credit-scoring
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.7"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare preprocessed dataset
        run: |
          python Eksperimen_SML_Rafli-Ardiansyah/preprocessing/automate_Rafli_Ardiansyah.py \
            --output-dir Workflow-CI/MLProject/credit_default_preprocessing

      - name: Run MLflow Project
        working-directory: Workflow-CI
        run: |
          mlflow run MLProject --env-manager=local

      - name: Get latest MLflow run id
        id: run
        working-directory: Workflow-CI/MLProject
        run: echo "run_id=$(cat latest_run_id.txt)" >> "$GITHUB_OUTPUT"

      - name: Upload MLflow artifacts to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-artifacts-${{ steps.run.outputs.run_id }}
          path: Workflow-CI/mlruns

      - name: Build Docker-compatible model image
        working-directory: Workflow-CI
        run: |
          mlflow models build-docker \
            -m "runs:/${{ steps.run.outputs.run_id }}/model" \
            -n "$IMAGE_NAME:latest"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push model image
        run: docker push "$IMAGE_NAME:latest"
